# render.yaml
services:
  - type: web
    name: ai-resume-analyzer-api
    env: python
    runtime: python312  # Add this line
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-resume-analyzer-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "360"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app,http://localhost:5173

databases:
  - name: ai-resume-analyzer-db
    plan: free
    databaseName: resume_analyzer